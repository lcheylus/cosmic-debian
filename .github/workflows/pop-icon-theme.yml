# Workflow to build Debian package pop-icon-theme
name: Build package pop-icon-theme
on: workflow_dispatch

jobs:
  pop-icon-them:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          repository: 'pop-os/icon-theme'
          ref: 'v3.5.1'

      - uses: jtdor/build-deb-action@v1
        env:
          DEB_BUILD_OPTIONS: noautodbgsym
        with:
          # docker-image: testing
          extra-build-deps: lsb-release
          before-build-hook: |
            echo "### lsb_release -a"
            lsb_release -a
            echo "### uname -a"
            uname -a
          buildpackage-opts: --build=binary --no-sign

      - name: Get infos for Debian package
        run: |
          dpkg --info debian/artifacts/pop-icon-theme_3.5.1_all.deb
          dpkg --contents debian/artifacts/pop-icon-theme_3.5.1_all.deb
